project:
  type: website
  output-dir: docs
  render:
    - "index.qmd"
    - "mental-models.qmd"
    - "ship-notes.qmd"
    - "posts/"

website:
  title: " "
  navbar:
    background: "#FAFAF8"
    right:
      - text: "Library"
        href: index.qmd
      - text: "Mental Models"
        href: mental-models.qmd
      - text: "Ship Notes"
        href: ship-notes.qmd
      - text: "GitHub"
        href: https://github.com/analyticsgym

format:
  html:
    theme: default
    css: styles.css
    toc: true
    toc-location: right
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
